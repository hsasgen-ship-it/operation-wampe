// ── HEADER ─────────────────────────────────────────────────────────────────
function updateHeader(){
  const now = new Date();
  const di = getDayIdx();
  const tp = weeklyPlan[di];

  document.getElementById('hdr-day').textContent = DAYS_DE[now.getDay()];
  document.getElementById('hdr-date').textContent = now.getDate()+'. '+MONTHS_DE[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('hdr-kcal').textContent = KCAL;

  // 30-Tage-Challenge – automatisch mit Tag 1 starten wenn noch kein Start
  let start = load('challengeStart', null);
  if(!start){
    start = new Date().toISOString();
    save('challengeStart', start);
  }
  const cd = document.getElementById('hdr-challenge');
  const pb = document.getElementById('hdr-progress');
  const diff = Math.floor((now - new Date(start))/(1000*60*60*24))+1;
  const day = Math.min(diff,30);
  const pct = Math.round((day/30)*100);
  if(cd){
    if(day<=30){
      cd.innerHTML = '<div style="font-size:13px;letter-spacing:3px;color:#4a6080;text-transform:uppercase;margin-top:6px">Challenge</div>'
        +'<div class="bc" style="font-size:90px;font-weight:700;color:#f5c842;line-height:1">TAG '+day+'</div>'
        +'<div style="font-size:14px;color:#4a6080;margin-top:2px">von 30 · '+pct+'% geschafft</div>';
      if(pb) pb.style.width = pct+'%';
    } else {
      cd.innerHTML = '<div class="bc" style="font-size:60px;font-weight:700;color:#22d3a0;line-height:1">TAG 30</div>'
        +'<div style="font-size:16px;color:#22d3a0;margin-top:4px">🏆 CHALLENGE ABGESCHLOSSEN!</div>';
      if(pb) pb.style.width = '100%';
    }
  }

  // Bauchumfang Sonntag Abend
  const bb = document.getElementById('hdr-bauch');
  if(now.getDay()===0 && load('lastBauch','')<todayKey()){
    const hist = load('bauchHist',[]);
    const last = hist.length ? hist[hist.length-1].cm : null;
    bb.style.display = 'block';
    bb.innerHTML = '<div style="background:#1a0a2d;border:2px solid #a78bfa;border-radius:10px;padding:14px">'
      +'<div class="bc" style="font-size:20px;font-weight:700;color:#a78bfa;margin-bottom:6px">📏 SONNTAG = BAUCHUMFANG MESSEN!</div>'
      +'<div style="font-size:14px;color:#4a6080;margin-bottom:10px">Nüchtern, auf Bauchnabelhöhe.'+(last?' Letzter Wert: <b style="color:#e2eeff">'+last+' cm</b>':' Erster Messwert!')+'</div>'
      +'<div style="display:flex;gap:10px;align-items:center">'
      +'<input type="number" id="bauch-inp" placeholder="z.B. 112" style="flex:1;background:#0d2040;border:1px solid #a78bfa;border-radius:8px;padding:12px;color:#e2eeff;font-size:18px;font-family:DM Sans,sans-serif">'
      +'<span style="color:#4a6080">cm</span>'
      +'<button onclick="saveBauch()" style="background:#a78bfa;border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:700;padding:12px 16px;cursor:pointer">💾</button>'
      +'</div></div>';
  } else {
    bb.style.display = 'none';
  }
}

function updateSlider(field, val, labels, unit, color){
  const parsed = parseFloat(val);
  const displayVal = labels ? (labels[Math.round(parsed)]||parsed) : parsed+unit;
  const el = document.getElementById('sl-'+field);
  if(el){ el.textContent=displayVal; el.style.color=color; }
  // Update track gradient
  const inp = document.getElementById('inp-'+field);
  if(inp){
    const min=parseFloat(inp.min), max=parseFloat(inp.max);
    const pct = Math.round(((parsed-min)/(max-min))*100);
    inp.style.background = 'linear-gradient(to right,'+color+' '+pct+'%,#2a4a7f '+pct+'%)';
  }
  setTrack(field, parsed);
}

// Linien-Chart mit Füllung, Dots, Ziel-Linie
function lineChart(data, color, unit, targetLine, H){
  if(data.length < 2) return data.length===1
    ? '<div style="text-align:center;padding:20px;font-size:15px;color:#4a6080">1 Datenpunkt – noch einen eintragen für die Kurve!</div>' : '';
  const W=340, PAD=40, PADR=16, PADT=20, PADB=32;
  const vals = data.map(function(d){return d.v;});
  const minV = Math.min.apply(null,vals), maxV = Math.max.apply(null,vals);
  const pad = (maxV-minV)*0.15 || 1;
  const lo = minV-pad, hi = maxV+pad;
  const toX = function(i){return PAD+(i/(data.length-1))*(W-PAD-PADR);};
  const toY = function(v){return PADT+(1-(v-lo)/(hi-lo))*(H-PADT-PADB);};
  const pts = data.map(function(d,i){return toX(i)+','+toY(d.v);});
  const line = 'M'+pts.join(' L');
  const fill = line+' L'+toX(data.length-1)+','+(H-PADB)+' L'+toX(0)+','+(H-PADB)+' Z';
  const id = 'g'+color.replace(/[^a-z0-9]/gi,'');
  // Grid lines
  const grid = [0,0.25,0.5,0.75,1].map(function(t){
    const y = PADT+t*(H-PADT-PADB);
    const v = hi-(t*(hi-lo));
    return '<line x1="'+PAD+'" y1="'+y+'" x2="'+(W-PADR)+'" y2="'+y+'" stroke="#0d1a30" stroke-width="1"/>'
      +'<text x="'+(PAD-5)+'" y="'+(y+4)+'" fill="#4a6080" font-size="9" font-family="DM Sans" text-anchor="end">'+Math.round(v)+unit+'</text>';
  }).join('');
  // Target line
  const tl = targetLine!=null
    ? '<line x1="'+PAD+'" y1="'+toY(targetLine)+'" x2="'+(W-PADR)+'" y2="'+toY(targetLine)+'" stroke="#22d3a0" stroke-width="1.5" stroke-dasharray="5,3"/>'
      +'<text x="'+(W-PADR-2)+'" y="'+(toY(targetLine)-4)+'" fill="#22d3a0" font-size="9" font-family="DM Sans" text-anchor="end">Ziel '+targetLine+unit+'</text>'
    : '';
  // X labels
  const step = Math.max(1,Math.floor(data.length/5));
  const xlabels = data.map(function(d,i){
    return (i%step===0||i===data.length-1)
      ? '<text x="'+toX(i)+'" y="'+(H-PADB+14)+'" fill="#4a6080" font-size="8" font-family="DM Sans" text-anchor="middle">'+d.label+'</text>' : '';
  }).join('');
  // Dots with values
  const dots = data.map(function(d,i){
    const x=toX(i), y=toY(d.v);
    const isLast = i===data.length-1;
    const prev = i>0?data[i-1].v:d.v;
    const col = d.v<prev?'#22d3a0':d.v>prev?'#f55a42':color;
    return '<circle cx="'+x+'" cy="'+y+'" r="'+(isLast?5:3)+'" fill="'+(isLast?color:col)+'" stroke="#050d1a" stroke-width="1.5"/>'
      +(isLast?'<text x="'+(x+7)+'" y="'+(y+4)+'" fill="'+color+'" font-size="10" font-weight="bold" font-family="DM Sans">'+d.v+unit+'</text>':'');
  }).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;overflow:visible" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+color+'" stop-opacity="0.35"/>'
    +'<stop offset="100%" stop-color="'+color+'" stop-opacity="0.02"/>'
    +'</linearGradient></defs>'
    +grid+tl
    +'<path d="'+fill+'" fill="url(#'+id+')"/>'
    +'<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    +dots+xlabels
    +'</svg>';
}

// Kuchen-Chart (echtes Donut)
function donutChart(vals, colors, labels){
  const total = vals.reduce(function(a,b){return a+b;},0)||1;
  const r=52, cx=70, cy=70, sw=22, W=280, H=140;
  let angle = -90;
  const arcs = vals.map(function(v,i){
    if(v===0) return '';
    const pct = v/total;
    const a1 = angle*Math.PI/180;
    const a2 = (angle+pct*360-0.5)*Math.PI/180;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const large = pct>0.5?1:0;
    const path = 'M'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2;
    angle += pct*360;
    return '<path d="'+path+'" fill="none" stroke="'+colors[i]+'" stroke-width="'+sw+'" stroke-linecap="round"/>';
  }).join('');
  // Center text
  const biggest = vals.indexOf(Math.max.apply(null,vals));
  const pct = Math.round(vals[biggest]/total*100);
  const legend = labels.map(function(l,i){
    if(vals[i]===0) return '';
    const p = Math.round(vals[i]/total*100);
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      +'<div style="width:12px;height:12px;border-radius:3px;background:'+colors[i]+';flex-shrink:0"></div>'
      +'<div style="font-size:14px;color:#e2eeff">'+l+': <b>'+vals[i]+'×</b> <span style="color:#4a6080">('+p+'%)</span></div>'
      +'</div>';
  }).join('');
  return '<div style="display:flex;align-items:center;gap:16px">'
    +'<svg viewBox="0 0 140 140" style="width:120px;height:120px;flex-shrink:0" xmlns="http://www.w3.org/2000/svg">'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#0d1a30" stroke-width="'+sw+'"/>'
    +arcs
    +'<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" fill="'+colors[biggest]+'" font-size="20" font-weight="bold" font-family="Barlow Condensed">'+pct+'%</text>'
    +'<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="#4a6080" font-size="9" font-family="DM Sans">'+labels[biggest]+'</text>'
    +'</svg>'
    +'<div style="flex:1">'+legend+'</div>'
    +'</div>';
}

// Gestapelter Tages-Balken (alle Werte auf einer Zeitachse)
function stackedTimeChart(entries, H){
  if(entries.length<2) return '';
  const W=340, PADL=8, PADR=8, PADT=16, PADB=24;
  const n = entries.length;
  const bw = (W-PADL-PADR)/n;
  const bars = entries.map(function(entry,i){
    const d = entry[1];
    const x = PADL + i*bw;
    // Scores: food, sport, schlaf, stress
    const foodScore = d.food==='gut'?2:d.food==='mixed'?1:0;
    const sportScore = (d.sportMin||0)>=30?2:(d.sportMin||0)>0?1:0;
    const sleepScore = (d.schlaf||0)>=7?2:(d.schlaf||0)>=6?1:0;
    const stressScore = d.stress==='low'?2:d.stress==='medium'?1:0;
    const total = foodScore+sportScore+sleepScore+stressScore;
    const maxScore = 8;
    const bh = Math.max((total/maxScore)*(H-PADT-PADB), total>0?4:0);
    const col = total>=6?'#22d3a0':total>=4?'#1d6ef5':total>=2?'#f5c842':'#f55a42';
    const label = entry[0].slice(5);
    return '<rect x="'+(x+bw*0.1)+'" y="'+(H-PADB-bh)+'" width="'+(bw*0.8)+'" height="'+bh+'" fill="'+col+'" rx="2"/>'
      +(i%Math.max(1,Math.floor(n/6))===0||i===n-1
        ?'<text x="'+(x+bw/2)+'" y="'+(H-PADB+14)+'" fill="#4a6080" font-size="8" font-family="DM Sans" text-anchor="middle">'+label+'</text>':'');
  }).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">'+bars+'</svg>';
}

// Heatmap Chart (7 Tage × Wochen)
function heatmapChart(entries){
  if(!entries.length) return '';
  const cellW=38, cellH=38, cols=7, GAP=4;
  const weeks = Math.ceil(entries.length/7);
  const W = cols*(cellW+GAP)+2, H = weeks*(cellH+GAP)+22;
  const dayLabels = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const header = dayLabels.map(function(d,i){
    return '<text x="'+(i*(cellW+GAP)+cellW/2)+'" y="14" fill="#4a6080" font-size="9" font-family="DM Sans" text-anchor="middle">'+d+'</text>';
  }).join('');
  // Align to Monday
  const firstDay = new Date(entries[0][0]);
  const offset = (firstDay.getDay()+6)%7;
  const cells = entries.map(function(entry,i){
    const pos = i+offset;
    const col = pos%7;
    const row = Math.floor(pos/7);
    const x = col*(cellW+GAP);
    const y = 20+row*(cellH+GAP);
    const d = entry[1];
    const foodScore = d.food==='gut'?2:d.food==='mixed'?1:0;
    const sportScore = (d.sportMin||0)>=30?2:(d.sportMin||0)>0?1:0;
    const sleepScore = (d.schlaf||0)>=7?2:(d.schlaf||0)>=6?1:0;
    const stressScore = d.stress==='low'?2:d.stress==='medium'?1:0;
    const total = foodScore+sportScore+sleepScore+stressScore;
    const col2 = total>=7?'#22d3a0':total>=5?'#1d6ef5':total>=3?'#f5c842':total>0?'#f55a42':'#0d1a30';
    const label = entry[0].slice(8);
    return '<rect x="'+x+'" y="'+y+'" width="'+cellW+'" height="'+cellH+'" fill="'+col2+'" rx="6"/>'
      +'<text x="'+(x+cellW/2)+'" y="'+(y+cellH/2+4)+'" fill="'+(total>3?'#050d1a':'#4a6080')+'" font-size="11" font-weight="bold" font-family="DM Sans" text-anchor="middle">'+label+'</text>';
  }).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">'+header+cells+'</svg>';
}

function setTrack(field, val){
  const dk=todayKey();
  if(!tracker[dk]) tracker[dk]={};
  tracker[dk][field]=val;
  save('tracker3',tracker);
  render();
}

function saveMeasurement(type){
  const today = todayKey();
  if(type==='gew'){
    const inp = document.getElementById('gew-heute-inp');
    if(!inp||!inp.value) return;
    const kg = parseFloat(inp.value);
    if(kg<50||kg>300){alert('Bitte realistischen Wert!');return;}
    setTrack('gewicht', kg);
    const hist = load('gewHist',[]);
    const ex = hist.findIndex(function(h){return h.date===today;});
    if(ex>=0) hist[ex].kg=kg; else hist.push({date:today,kg:kg});
    save('gewHist', hist);
    const diff = hist.length>1?Math.round((hist[0].kg-kg)*10)/10:null;
    showModal('⚖️ '+kg+' kg gespeichert!',
      diff>0?'🎉 −'+diff+' kg seit Start! Weiter so, Heiko!':
      diff<0?'Noch +'+Math.abs(diff)+' kg dran bleiben!':
      'Erster Wert! Ziel: 120 → 110 → 102 kg. Du schaffst das, Heiko!');
  } else {
    const inp = document.getElementById('bauch-heute-inp');
    if(!inp||!inp.value) return;
    const cm = parseFloat(inp.value);
    if(cm<60||cm>200){alert('Bitte realistischen Wert!');return;}
    setTrack('bauchUmfang', cm);
    const hist = load('bauchHist',[]);
    const ex = hist.findIndex(function(h){return h.date===today;});
    if(ex>=0) hist[ex].cm=cm; else hist.push({date:today,cm:cm});
    save('bauchHist', hist);
    const diff = hist.length>1?Math.round((hist[0].cm-cm)*10)/10:null;
    showModal('📏 '+cm+' cm gespeichert!',
      diff>0?'🎉 −'+diff+' cm seit Start! Bauchfett schmilzt, Heiko!':
      diff<0?'Noch +'+Math.abs(diff)+' cm dran bleiben!':
      'Erster Wert gespeichert! Nächste Messung wann du willst.');
  }
}

  }
  const data = {
    tracker: load('tracker3',{}),
    bauchHist: load('bauchHist',[]),
    gewHist: load('gewHist',[]),
    challengeStart: load('challengeStart',null),
    exportDate: new Date().toISOString(),
    version: '2.0'
  };
  const filename = '/wampe-backup-'+todayKey()+'.json';
  fetch('https://content.dropboxapi.com/2/files/upload', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer '+load('dropboxToken',''),
      'Dropbox-API-Arg': JSON.stringify({path:filename, mode:'overwrite', autorename:false}),
      'Content-Type': 'application/octet-stream'
    },
    body: JSON.stringify(data, null, 2)
  }).then(function(r){
    if(r.ok){
      showModal('✅ Dropbox Backup!','Datei '+filename+' wurde in deiner Dropbox gespeichert, Heiko!');
    } else {
      r.text().then(function(t){
        showModal('❌ Dropbox Fehler','Token abgelaufen? Unter ⚙️ Key → "Dropbox Token löschen" und neu eingeben.\n\n'+t.slice(0,100));
        save('dropboxToken','');
      });
    }
  }).catch(function(){
    showModal('❌ Fehler','Keine Verbindung. Normalen Export verwenden!');
  });
}

function clearDropboxToken(){

}

function importData(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const data = JSON.parse(ev.target.result);
        if(data.tracker) save('tracker3', data.tracker);
        if(data.bauchHist) save('bauchHist', data.bauchHist);
        if(data.gewHist) save('gewHist', data.gewHist);
        if(data.challengeStart) save('challengeStart', data.challengeStart);
        if(data.weeklyPlan) save('plan3', data.weeklyPlan);
        tracker = load('tracker3',{});
        weeklyPlan = load('plan3', PLAN);
        showModal('✅ Daten wiederhergestellt!','Heiko, alle deine Daten sind wieder da! Backup vom '+data.exportDate.slice(0,10));
        updateHeader();
        render();
      }catch(err){
        showModal('❌ Fehler','Die Datei konnte nicht gelesen werden. Bitte das richtige Backup auswählen!');
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function startChallenge(){
  if(confirm('30-Tage-Challenge jetzt starten, Heiko?')){
    save('challengeStart',new Date().toISOString());
    updateHeader();
    render();
  }
}

function showSettings(){
  const current = load('anthropicKey','');
  const key = prompt('Anthropic API Key eingeben (beginnt mit sk-ant-):\n\nKey wird nur lokal auf deinem Gerät gespeichert – nie übertragen!', current);
  if(key !== null){
    save('anthropicKey', key.trim());
    showModal('✅ API Key gespeichert!', 'Foto-Analyse ist jetzt aktiviert, Heiko!');
  }
}

function saveGewichtStats(){
  const inp = document.getElementById('gew-stats-inp');
  if(!inp||!inp.value) return;
  const kg = parseFloat(inp.value);
  if(kg<50||kg>300){alert('Bitte realistischen Wert!');return;}
  const hist = load('gewHist',[]);
  const today = todayKey();
  const ex = hist.findIndex(function(h){return h.date===today;});
  if(ex>=0) hist[ex].kg=kg; else hist.push({date:today,kg:kg});
  save('gewHist',hist);
  setTrack('gewicht',kg);
  const diff = hist.length>1?Math.round((hist[0].kg-kg)*10)/10:null;
  showModal('⚖️ '+kg+' kg gespeichert!',
    diff>0?'🎉 −'+diff+' kg seit Start! Weiter so, Heiko!':
    diff<0?'Noch +'+Math.abs(diff)+' kg – dran bleiben!':
    'Erster Wert! Ziel: 120 → 110 → 102 kg. Du schaffst das, Heiko!');
  render();
}

function saveBauchStats(){
  const inp = document.getElementById('bauch-stats-inp');
  if(!inp||!inp.value) return;
  const cm = parseFloat(inp.value);
  if(cm<60||cm>200){alert('Bitte realistischen Wert!');return;}
  const hist = load('bauchHist',[]);
  const today = todayKey();
  const ex = hist.findIndex(function(h){return h.date===today;});
  if(ex>=0) hist[ex].cm=cm; else hist.push({date:today,cm:cm});
  save('bauchHist',hist);
  setTrack('bauchUmfang',cm);
  save('lastBauch',today);
  const diff = hist.length>1?Math.round((hist[0].cm-cm)*10)/10:null;
  showModal('📏 '+cm+' cm gespeichert!',
    diff>0?'🎉 −'+diff+' cm seit Start! Bauchfett schmilzt, Heiko!':
    diff<0?'Noch +'+Math.abs(diff)+' cm – dran bleiben!':
    'Erster Wert gespeichert! Nächste Messung in einer Woche.');
  render();
}


function saveBauchCheck(){
  const inp = document.getElementById('bauch-check-inp');
  if(!inp||!inp.value) return;
  const cm = parseFloat(inp.value);
  if(cm<60||cm>200){alert('Bitte realistischen Wert eingeben!');return;}
  // Mit Tagesdaten speichern
  setTrack('bauchUmfang', cm);
  // Auch in History
  const hist = load('bauchHist',[]);
  const today = todayKey();
  const existing = hist.findIndex(function(h){return h.date===today;});
  if(existing>=0) hist[existing].cm = cm;
  else hist.push({date:today, cm:cm});
  save('bauchHist', hist);
  save('lastBauch', today);
  const diff = hist.length>1 ? Math.round((hist[0].cm - cm)*10)/10 : null;
  showModal(
    '📏 '+cm+' cm gespeichert!',
    diff>0 ? '🎉 −'+diff+' cm seit Start! Weiter so, Heiko!'
    : diff<0 ? 'Noch +'+Math.abs(diff)+' cm – dran bleiben, Heiko!'
    : 'Erster Messwert gespeichert. Nächste Messung wann du willst!'
  );
  render();
}

  document.getElementById('modal-title').textContent=title;

}
